hf:
  token: ""
  endpoint: ""

clients:
  teacher:
    type: "openai_compatible"
    api_key: 
    base_url: 
    model: 
    timeout: 600
    record_trajectory: true
    params:
      # temperature: 1.0
      # top_p: 0.95
      max_completion_tokens: 122880
    extra_body: {}
    capabilities:
      reasoning_content: true
      native_tool_calls: true

resources:
  gpus:
    cuda_visible_devices: "0,1"

autonomous:
  enabled: true
  mode: "agent_kernel"

frontier_trajectory:
  enabled: true
  root: ".autopilot/frontier_trajectory"
  max_chars_per_field: 0
  write_trainable: true
  teacher_only: true

web_search:
  provider: "serper"
  serper_api_key: 
  brave_api_key: ""
  tavily_api_key: ""

runtime:
  repo_path: "."
  environments:
    - name: "llama-factory"
      path: "../anaconda3"
      conda_env: "llamaf"
      activation: "source ../anaconda3/bin/activate llamaf"
      description: "Pre-installed LLaMA-Factory training environment; use for SFT/DPO/KTO/PT/RM/PPO/GRPO training."
      capabilities: ["llamafactory", "sft", "dpo", "kto", "pt", "rm", "ppo", "grpo", "training"]

    - name: "vllm"
      path: "../anaconda3"
      conda_env: "lapha-beta"
      activation: "source ../anaconda3/bin/activate vllm"
      description: "Verified local vLLM serving/probe/eval environment."
      capabilities: ["vllm"]

ask_human:
  enabled: true
  mode: "queue"

memory:
  claude:
    enabled: true
